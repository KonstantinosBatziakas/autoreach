<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- AR letterform made of connected dots and lines -->
  <!-- Left leg of A -->
  <line x1="10" y1="90" x2="45" y2="20" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg of A (connects to R) -->
  <line x1="45" y1="20" x2="80" y2="90" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Crossbar of A -->
  <line x1="22" y1="60" x2="68" y2="60" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- R vertical -->
  <line x1="80" y1="20" x2="80" y2="90" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>
  <!-- R curve top -->
  <path d="M80 20 Q120 20 120 45 Q120 70 80 70" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- R leg -->
  <line x1="80" y1="70" x2="120" y2="90" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Nodes (dots) at key points -->
  <circle cx="45" cy="20" r="7" fill="#5BC8F5"/>
  <circle cx="10" cy="90" r="7" fill="#4AABF0"/>
  <circle cx="80" cy="90" r="7" fill="#4AABF0"/>
  <circle cx="120" cy="45" r="7" fill="#5BC8F5"/>
  <circle cx="80" cy="70" r="7" fill="#4AABF0"/>
  <circle cx="120" cy="90" r="7" fill="#5BC8F5"/>

  <!-- "AUTOREACH" text -->
  <text x="145" y="65" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="28" font-weight="800" fill="white" letter-spacing="2">AutoReach</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4AABF0"/>
      <stop offset="100%" stop-color="#5BC8F5"/>
    </linearGradient>
  </defs>
</svg>
