<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AutoReach</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #1a2e2e;
            color: #cde0de;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(12px);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
        }
        .logo p { font-size: 12px; color: #6a9090; margin-top: 6px; }
        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6a9090;
            margin-bottom: 8px;
        }
        input[type=password] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #cde0de;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }
        input[type=password]:focus { border-color: #4ecdc4; }
        button {
            width: 100%;
            padding: 13px;
            background: #e8806a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.15s;
        }
        button:hover { background: #c4614a; }
        .error {
            background: rgba(232,80,80,0.12);
            border: 1px solid rgba(232,80,80,0.3);
            color: #f07070;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>AUTOREACH</h1>
            <p>Admin dashboard login</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autofocus placeholder="Enter dashboard password">
            <button type="submit">Sign In →</button>
        </form>
    </div>
</body>
</html>
